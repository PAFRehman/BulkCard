[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Ensure Node 18+ for native fetch
  # Netlify usually defaults to 18 now, but this ensures it:
  
[dev]
  functions = "netlify/functions"
  targetPort = 8888

# Environment variables MUST be set in Netlify Dashboard, not here
