[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  X_REDIRECT_URI = "https://bulkcard.netlify.app/.netlify/functions/auth-callback"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
